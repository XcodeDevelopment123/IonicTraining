<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>tsExercise</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
 
  <h1>Total Student = {{getTotalStudent()}}</h1>
  <ion-input [(ngModel)]="InputName" placeholder="Insert Name"></ion-input>

  <ion-button (click)="addStudent()">Add Sample data</ion-button>


  <ion-list>
    <ion-item *ngFor="let pair of studentList">
      {{pair.name}}

      <ion-button color="danger" (click)="Delete(pair.id)">Delete</ion-button>
    </ion-item>
  </ion-list>
</ion-content>
