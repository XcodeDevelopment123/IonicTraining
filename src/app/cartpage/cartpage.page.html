<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>cartpage</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-list>
    <ion-item *ngFor="let pair of CartList">

      <h1>{{pair.productName}} </h1>

      <h2>| Qty x {{pair.quantity}}</h2>

    </ion-item>
  </ion-list>

</ion-content>
