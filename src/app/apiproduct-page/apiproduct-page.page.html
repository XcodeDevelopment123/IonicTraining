<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>APIProductPage</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-list>
    <ion-item *ngFor="let pair of ProductList">

      <div style="width: 50px;height: 50px; background-color: {{pair.backgroundColor}};">
      </div>
       <h1 style="margin: 10px;">{{pair.name}}</h1> 


       <ion-button color="primary" (click)="AddtoCart(pair.id)">Add to cart</ion-button>


    </ion-item>
  </ion-list>


  <ion-button (click)="LinkToCart()">Link to cart</ion-button>





</ion-content>
